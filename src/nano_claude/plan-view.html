<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Document - nanoClaude</title>
<style>
  :root { --bg: #ffffff; --bg2: #f6f8fa; --text: #24292f; --text-dim: #656d76;
    --border: #d0d7de; --accent: #0969da; --mono: "SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --font: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0d1117; --bg2: #161b22; --text: #c9d1d9; --text-dim: #6e7a8a;
      --border: #30363d; --accent: #58a6ff; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 15px/1.7 var(--font); background: var(--bg); color: var(--text); }
  #header { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
    font-size: 13px; }
  #header .name { font-weight: 600; color: var(--text); }
  #header .meta { color: var(--text-dim); }
  #header .spacer { flex: 1; }
  #download-btn { padding: 5px 14px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); cursor: pointer; font-size: 13px; }
  #download-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  #content { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
  #content h1 { font-size: 1.6em; margin: 1em 0 0.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  #content h2 { font-size: 1.3em; margin: 1em 0 0.4em; }
  #content h3 { font-size: 1.1em; margin: 0.8em 0 0.3em; }
  #content p { margin: 0.6em 0; }
  #content ul, #content ol { padding-left: 22px; margin: 0.5em 0; }
  #content li { margin: 0.25em 0; }
  #content pre { background: var(--bg2); padding: 14px; border-radius: 6px; overflow-x: auto;
    margin: 10px 0; font-size: 13px; line-height: 1.5; border: 1px solid var(--border); }
  #content code { background: var(--bg2); padding: 2px 6px; border-radius: 4px;
    font-family: var(--mono); font-size: 0.9em; }
  #content pre code { background: none; padding: 0; }
  #content blockquote { border-left: 3px solid var(--accent); padding-left: 12px;
    margin: 8px 0; color: var(--text-dim); }
  #content table { border-collapse: collapse; margin: 10px 0; font-size: 14px; width: 100%; }
  #content th, #content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  #content th { background: var(--bg2); font-weight: 600; }
  #content a { color: var(--accent); text-decoration: none; }
  #content a:hover { text-decoration: underline; }
  #content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  #content img { max-width: 100%; }
  #empty-state { max-width: 500px; margin: 80px auto; text-align: center; color: var(--text-dim); }
  #empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  #empty-state h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
  #empty-state p { font-size: 14px; line-height: 1.6; }
  #loading { text-align: center; padding: 80px; color: var(--text-dim); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="header">
  <span class="name" id="filename"></span>
  <span class="meta" id="filemeta"></span>
  <span class="spacer"></span>
  <button id="download-btn" onclick="downloadDoc()">⬇ Download .md</button>
</div>
<div id="loading"><div class="spinner"></div><br><br>Loading plan document...</div>
<div id="content" style="display:none"></div>
<div id="empty-state" style="display:none">
  <div class="icon">📋</div>
  <h2>No Plan Document</h2>
  <p>No plan document has been created yet.<br>Switch to Plan mode and ask AI to create a plan.</p>
</div>
<script>
  let _docContent = '';
  let _docFilename = '';
  function esc(str) {
    const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
  }
  function renderMarkdown(text) {
    if (!text) return '';
    let h = esc(text);
    h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return '<pre><code class="language-'+lang+'">'+code+'</code></pre>';
    });
    h = h.replace(/((?:^\|.*(?:\n|$)){2,})/gm, block => {
      const lines = block.trim().split('\n').map(l=>l.trim());
      if (lines.length<2||!/^\|[\s:|-]+\|$/.test(lines[1])) return block;
      const a = lines[1].split('|').slice(1,-1).map(c=>{const t=c.trim();return /^:---+:$/.test(t)?'center':/^:---+$/.test(t)?'left':/^---+:$/.test(t)?'right':null});
      const hd = lines[0].split('|').slice(1,-1);
      const nc = Math.max(hd.length,a.length);
      let x='<table>\n<thead>\n<tr>';
      for(let i=0;i<nc;i++){const al=a[i]?' align="'+a[i]+'"':'';x+='<th'+al+'>'+(i<hd.length?hd[i].trim():'')+'</th>';}
      x+='</tr>\n</thead>\n<tbody>\n';
      for(let ri=2;ri<lines.length;ri++){const d=lines[ri].split('|').slice(1,-1);x+='<tr>';
        for(let ci=0;ci<nc;ci++){const al=a[ci]?' align="'+a[ci]+'"':'';x+='<td'+al+'>'+(ci<d.length?d[ci].trim():'')+'</td>';}
        x+='</tr>\n';}
      x+='</tbody>\n</table>';return x;
    });
    h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    h = h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
    h = h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
    h = h.replace(/^---$/gm,'<hr>');
    h = h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
    h = h.replace(/(?:^|\n)[ \t]*[-*+] (.+(?:\n[ \t]*[-*+] .+)*)/g,m=>{const i=m.trim().split('\n').map(l=>'<li>'+l.replace(/^[ \t]*[-*+] /,'')+'</li>').join('\n');return '<ul>\n'+i+'\n</ul>'});
    h = h.replace(/(?:^|\n)[ \t]*\d+\. (.+(?:\n[ \t]*\d+\. .+)*)/g,m=>{const i=m.trim().split('\n').map(l=>'<li>'+l.replace(/^[ \t]*\d+\. /,'')+'</li>').join('\n');return '<ol>\n'+i+'\n</ol>'});
    h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
    h = h.replace(/\*\*\*([^*]+)\*\*\*/g,'<strong><em>$1</em></strong>');
    h = h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    h = h.replace(/\*([^*]+)\*/g,'<em>$1</em>');
    h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    const blockTag=/^<(p|h[1-6]|pre|ul|ol|li|blockquote|hr|div|table)[\s>]/;
    h = h.split(/\n{2,}/).map(b=>{const t=b.trim();if(!t)return'';if(blockTag.test(t))return t;return'<p>'+t.replace(/\n/g,'<br>')+'</p>';}).join('\n');
    return h;
  }
  async function loadPlan() {
    try {
      const r = await fetch('/api/plan-doc');
      const d = await r.json();
      if (!d.exists) {
        document.getElementById('loading').style.display='none';
        document.getElementById('empty-state').style.display='block';
        document.getElementById('header').style.display='none';
        return;
      }
      _docContent = d.content;
      _docFilename = d.filename;
      document.getElementById('loading').style.display='none';
      document.getElementById('content').style.display='block';
      document.getElementById('filename').textContent = d.filename;
      const date = new Date(d.modified * 1000);
      const fmt = date.getFullYear()+'-'+(date.getMonth()+1).toString().padStart(2,'0')+'-'+date.getDate().toString().padStart(2,'0')+' '+date.getHours().toString().padStart(2,'0')+':'+date.getMinutes().toString().padStart(2,'0');
      document.getElementById('filemeta').textContent = fmt+' · '+(d.size/1000).toFixed(1)+' KB';
      document.getElementById('content').innerHTML = renderMarkdown(d.content);
    } catch(e) {
      document.getElementById('loading').innerHTML = '<p style="color:var(--danger)">Failed to load: '+e.message+'</p>';
    }
  }
  function downloadDoc() {
    if (!_docContent) return;
    const blob = new Blob([_docContent], {type:'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = _docFilename || 'plan.md';
    a.click(); URL.revokeObjectURL(url);
  }
  loadPlan();
</script>
</body>
</html>
